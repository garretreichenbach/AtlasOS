name: Release web installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  release-web-installer:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Build installer
        run: python3 scripts/build_web_installer.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: atlasos-web-installer-${{ env.RELEASE_TAG }}
          path: dist/atlasos-web-installer.lua
          if-no-files-found: error

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: dist/atlasos-web-installer.lua
          generate_release_notes: true
          fail_on_unmatched_files: true
